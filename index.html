<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#011623">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BPM Tapper">
  <title>Water BPM Tapper</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="rippleCanvas" aria-hidden="true"></canvas>
  <main id="tapZone" role="button" aria-label="Tap anywhere to measure BPM">
    <button id="resetButton" type="button" aria-label="Reset BPM">Reset</button>
    <section class="display">
      <p id="bpmValue">--.-</p>
      <p class="bpm-label">BPM</p>
    </section>
    <p id="hint"></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
