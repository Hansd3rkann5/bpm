<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#011623">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Water BPM Tapper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="rippleCanvas" aria-hidden="true"></canvas>
  <main id="tapZone" role="button" aria-label="Tap anywhere to measure BPM">
    <button id="resetButton" type="button" aria-label="Reset BPM">Reset</button>
    <section class="display">
      <p id="bpmValue">--.-</p>
      <p class="bpm-label">BPM</p>
    </section>
    <p id="hint"></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
